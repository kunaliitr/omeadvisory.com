<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0b2318"/>
  
  <!-- Globe / Earth -->
  <circle cx="32" cy="32" r="20" fill="#1a5276"/>
  
  <!-- Ocean shading -->
  <circle cx="32" cy="32" r="20" fill="url(#oceanGrad)"/>
  
  <!-- Latitude lines -->
  <ellipse cx="32" cy="32" rx="20" ry="7" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>
  <ellipse cx="32" cy="32" rx="20" ry="13" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.6"/>
  
  <!-- Europe -->
  <path d="M29 18 Q33 17 35 21 Q37 25 35 28 Q33 30 30 29 Q27 27 27 23 Q27 20 29 18Z" fill="#27ae60" opacity="0.95"/>
  <!-- Scandinavia hint -->
  <path d="M32 17 Q34 15 33 14 Q31 14 30 16 Q31 16 32 17Z" fill="#27ae60" opacity="0.8"/>
  
  <!-- Africa -->
  <path d="M29 29 Q25 31 24 35 Q23 39 25 43 Q27 46 30 45 Q34 43 36 39 Q38 35 37 31 Q35 29 32 29 Q31 29 29 29Z" fill="#2ecc71" opacity="0.9"/>
  
  <!-- Sahara overlay -->
  <path d="M29 29 Q32 28 35 29 Q34 28 32 28 Q30 28 29 29Z" fill="#d4ac50" opacity="0.6"/>
  
  <!-- Arabian peninsula -->
  <path d="M36 31 Q39 33 40 36 Q39 38 37 37 Q36 34 36 31Z" fill="#d4ac50" opacity="0.7"/>

  <!-- Globe clip circle border -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#b8952a" stroke-width="1.2" opacity="0.7"/>

  <!-- OME text below globe removed — favicon too small for text -->
  <!-- Just the globe is cleaner at 16x16 tab size -->
  
  <defs>
    <radialGradient id="oceanGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#0e3460"/>
    </radialGradient>
  </defs>
</svg>
